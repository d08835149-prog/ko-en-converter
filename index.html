<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한영 오타 즉시 변환기 & 익명 광장</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/inko@1.1.1/inko.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto text-center mb-8">
        <h1 class="text-3xl font-extrabold text-indigo-600 mb-2">⌨️ 한영 오타 즉시 변환 플랫폼</h1>
        <p class="text-slate-500 text-sm">오타 변환은 기본, 익명 광장에서 다른 사람들과 실시간으로 소통해 보세요.</p>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-6xl mx-auto">
        
        <section class="lg:col-span-2 bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-800 flex flex-col justify-between">
            <div>
                <div class="flex justify-center space-x-3 mb-6">
                    <button id="btnEnToKo" class="px-4 py-2 bg-indigo-600 text-white font-medium rounded-xl shadow-sm text-sm transition" onclick="setMode('enToKo')">
                        영타 ➡️ 한글 (dkssud ➡️ 안녕하세요)
                    </button>
                    <button id="btnKoToEn" class="px-4 py-2 bg-slate-100 text-slate-600 font-medium rounded-xl hover:bg-slate-200 text-sm transition" onclick="setMode('koToEn')">
                        한타 ➡️ 영어 (듣 ➡️ emdt)
                    </button>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">변환할 텍스트 입력</label>
                        <textarea id="inputText" class="w-full h-36 p-3 text-slate-200 bg-slate-950 border border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none transition" placeholder="여기에 오타를 입력하세요..."> </textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">변환된 결과</label>
                        <div class="relative">
                            <div id="outputContainer" class="w-full h-36 p-3 bg-slate-900 text-slate-300 rounded-xl overflow-y-auto whitespace-pre-wrap font-medium">변환된 결과가 여기에 표시됩니다.</div>
                            <button id="btnCopy" class="absolute bottom-3 right-3 px-3 py-1.5 bg-slate-700 text-white text-xs font-medium rounded-lg hover:bg-slate-600 transition" onclick="copyToClipboard()">📋 복사하기</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 pt-6 border-t border-slate-100 text-xs text-slate-500 leading-relaxed">
                <h3 class="font-bold text-slate-700 mb-1">💡 한영 오타가 발생하는 이유</h3>
                <p>화면을 보지 않고 키보드만 보며 타이핑을 하거나, 자판을 치는 속도가 OS의 한영 전환 신호보다 빠를 때 발생합니다. 윈도우 환경에서 포커스 이동 시 자판 상태가 꼬이는 고질적인 현상을 이 도구로 빠르게 복구할 수 있습니다.</p>
            </div>
        </section>
        
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-[560px]">
            <div class="flex items-center justify-between mb-4 pb-2 border-b border-slate-100">
                <h2 class="font-bold text-lg text-slate-800 flex items-center">💬 실시간 익명 광장</h2>
                <span id="userBadge" class="text-xs bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-full font-semibold">접속 중</span>
            </div>

            <div id="chatMessages" class="flex-1 overflow-y-auto mb-4 space-y-3 pr-1 text-sm">
                <div class="text-center text-xs text-slate-400 my-2">채팅을 불러오는 중...</div>
            </div>

            <div class="flex space-x-2">
                <input type="text" id="chatInput" class="flex-1 border border-slate-200 px-3 py-2.5 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendChatMessage()">
                <button onclick="sendChatMessage()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-medium text-sm transition shadow-sm">전송</button>
            </div>
        </section>

    </main>

    <script>
        // ==========================================
        // 1. 초기 세팅 및 Supabase 주소/키 매칭 완료
        // ==========================================
        const inko = new Inko();
        let currentMode = 'enToKo';
        
        // Ditto의 Supabase 프로젝트 정보 주입 완형
        const SUPABASE_URL = 'https://qjccaalnreviybdkhfyo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqY2NhYWxucmV2aXliZGtoZnlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzgwMzQsImV4cCI6MjA5NjYxNDAzNH0.ktbJFUmaeRZNWLnmxJCSR3xNaEgSe1XGVCDz1vgXLQI'; // 앞서 캡처된 키 매칭

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 랜덤 익명 닉네임 생성 (예: 익명_A8F2)
        const myUsername = '익명_' + Math.random().toString(36).substring(2, 6).toUpperCase();
        document.getElementById('userBadge').innerText = myUsername;

        // DOM 원소들
        const inputText = document.getElementById('inputText');
        const outputContainer = document.getElementById('outputContainer');
        const btnEnToKo = document.getElementById('btnEnToKo');
        const btnKoToEn = document.getElementById('btnKoToEn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');

        // ==========================================
        // 2. 한영 오타 변환기 로직
        // ==========================================
        function convert() {
            const val = inputText.value;
            if (!val) {
                outputContainer.innerText = '변환된 결과가 여기에 표시됩니다.';
                return;
            }
            if (currentMode === 'enToKo') {
                outputContainer.innerText = inko.en2ko(val);
            } else {
                outputContainer.innerText = inko.ko2en(val);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            if (mode === 'enToKo') {
                btnEnToKo.className = "px-4 py-2 bg-indigo-600 text-white font-medium rounded-xl shadow-sm text-sm transition";
                btnKoToEn.className = "px-4 py-2 bg-slate-100 text-slate-600 font-medium rounded-xl hover:bg-slate-200 text-sm transition";
            } else {
                btnEnToKo.className = "px-4 py-2 bg-slate-100 text-slate-600 font-medium rounded-xl hover:bg-slate-200 text-sm transition";
                btnKoToEn.className = "px-4 py-2 bg-indigo-600 text-white font-medium rounded-xl shadow-sm text-sm transition";
            }
            convert();
        }

        inputText.addEventListener('input', convert);

        function copyToClipboard() {
            const text = outputContainer.innerText;
            if (!inputText.value) return;
            navigator.clipboard.writeText(text).then(() => {
                const btnCopy = document.getElementById('btnCopy');
                btnCopy.innerText = '✅ 복사 완료!';
                setTimeout(() => { btnCopy.innerText = '📋 복사하기'; }, 1500);
            });
        }

        // ==========================================
        // 3. Supabase 실시간 채팅 로직
        // ==========================================
        
        // 초기 최근 메시지 30개 로드
        async function loadInitialMessages() {
            let { data: messages, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(30);

            if (error) {
                chatMessages.innerHTML = `<div class="text-center text-red-500 text-xs">DB 연동 진행 중... SQL 설정을 확인해 주세요!</div>`;
                console.error(error);
                return;
            }

            chatMessages.innerHTML = ''; // 로딩 메시지 제거
            messages.forEach(msg => appendMessageHTML(msg));
            scrollToBottom();
        }

        // 화면에 메시지 말풍선 추가하는 함수
        function appendMessageHTML(msg) {
            const isMe = msg.username === myUsername;
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;

            msgDiv.innerHTML = `
                <span class="text-[11px] text-slate-400 px-1 mb-0.5">${msg.username}</span>
                <div class="max-w-[85%] px-3 py-2 rounded-2xl text-sm ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-100 text-slate-800 rounded-tl-none'}">
                    ${escapeHtml(msg.content)}
                </div>
            `;
            chatMessages.appendChild(msgDiv);
        }

        // 메시지 전송 (DB에 Insert)
        async function sendChatMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = ''; // 인풋 초기화

            const { error } = await supabaseClient
                .from('messages')
                .insert([{ username: myUsername, content: text }]);

            if (error) console.error('전송 실패:', error);
        }

        // 스크롤 맨 아래로 내리기
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // XSS 방지용 HTML 특수문자 치환 함수
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // ⚡ Supabase Realtime 구독 설정 (테이블 변경 실시간 감지)
        supabaseClient
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                appendMessageHTML(payload.new);
                scrollToBottom();
            })
            .subscribe();

        // 페이지 로드 시 초기 실행
        loadInitialMessages();
    </script>
</body>
</html>
